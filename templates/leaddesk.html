<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tigo LeadDesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .agent-email-badge { background: rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 99px; font-size: 12px; color: var(--muted); border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .status-btn-group { display: flex; gap: 8px; margin-left: 24px; }
    .st-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .st-btn.active-activo { background: rgba(16,185,129,0.1); color: var(--green); border-color: var(--green); }
    .st-btn.active-pausa { background: rgba(245,158,11,0.1); color: var(--orange); border-color: var(--orange); }
    .st-btn.active-offline { background: rgba(239,68,68,0.1); color: var(--red); border-color: var(--red); }
    
    .sidebar-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; letter-spacing: 0.1em; }
    .sidebar-stats { margin-top: 24px; }
    .sidebar-stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .sidebar-stat-row .label { color: var(--muted); }
    .sidebar-stat-row .val { font-weight: 700; }
    
    .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .action-btn { background: var(--surface2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.2s; }
    .action-btn:hover { border-color: var(--accent); background: rgba(0,132,255,0.05); }
    .action-btn i { font-size: 14px; }

    #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { padding: 80px 0; text-align: center; color: var(--muted); }
    .empty-icon { font-size: 48px; opacity: 0.2; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner"></div></div>

  <header>
    <div class="brand-container">
      <div class="logo-box" style="background: #00bcd4">T</div>
      <div class="brand-text">
        <div class="brand-title">Tigo LeadDesk</div>
        <div class="brand-sub">Vista Agente</div>
      </div>
    </div>
    
    <div style="display:flex; align-items:center">
      <div class="agent-email-badge">
        <i style="color:var(--green)">👤</i> Agente: <span id="agentEmailDisplay" style="color:var(--text); font-weight:700">—</span>
      </div>
      <div class="status-btn-group">
        <button class="st-btn" id="btn-ACTIVO" onclick="setStatus('ACTIVO')">● Activo</button>
        <button class="st-btn" id="id-PAUSA" onclick="setStatus('PAUSA')">● Pausa</button>
        <button class="st-btn" id="btn-OFFLINE" onclick="setStatus('OFFLINE')">● Offline</button>
      </div>
      <button class="btn btn-outline" style="margin-left:16px; height:36px; padding:0 12px" onclick="load()">🔄 Actualizar</button>
    </div>
  </header>

  <div class="main-wrapper">
    <div class="sidebar">
       <div class="sidebar-title">Panel de Control</div>
       <div class="action-btns">
         <button class="action-btn" onclick="takeLead()"><i>▶️</i> Tomar Lead</button>
         <button class="action-btn" onclick="manualSale()"><i>📝</i> Venta Manual</button>
       </div>
       
       <div class="sidebar-stats">
         <div class="sidebar-stat-row"><span class="label">Leads en Cola</span> <span class="val" id="sideQueue">0</span></div>
         <div class="sidebar-stat-row"><span class="label">Mis Pendientes</span> <span class="val" id="sideMine">0</span></div>
         <div class="sidebar-stat-row"><span class="label" style="color:var(--red)">Fuera de SLA</span> <span class="val" id="sideSla">0</span></div>
         <div class="sidebar-stat-row"><span class="label">Seguimientos hoy</span> <span class="val" id="sideFollowups">—</span></div>
         <div class="sidebar-stat-row"><span class="label">Mis Ventas</span> <span class="val" id="sideSales" style="color:var(--green)">0</span></div>
       </div>
    </div>

    <div class="content-area">
      <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('active')">Mis Leads <span class="tab-badge" id="badgeActive">0</span></button>
        <button class="tab-btn" onclick="switchTab('followups')">Seguimientos <span class="tab-badge" id="badgeFollowups">0</span></button>
        <button class="tab-btn" onclick="switchTab('sales')">Mis Ventas <span class="tab-badge" id="badgeSales">0</span></button>
        <button class="tab-btn" onclick="switchTab('backoffice')">Backoffice <span class="tab-badge" id="badgeBackoffice">0</span></button>
      </div>

      <div id="tab-active" class="tab-content active">
         <div id="leadsList">
           <div class="empty-state">
              <div class="empty-icon">📂</div>
              <div style="font-size:14px; font-weight:600">No tienes leads asignados.</div>
              <div style="font-size:12px; margin-top:4px">Presioná <b>Tomar Lead</b> cuando estés listo.</div>
           </div>
         </div>
      </div>
      
      <div id="tab-followups" class="tab-content"></div>
      <div id="tab-sales" class="tab-content"></div>
      <div id="tab-backoffice" class="tab-content"></div>
    </div>
  </div>

  <script>
    let agentEmail = '';
    let agentState = 'OFFLINE';
    let currentTab = 'active';

    async function init() {
      const params = new URLSearchParams(location.search);
      agentEmail = params.get('email') || localStorage.getItem('agent_email');
      if (!agentEmail) {
        agentEmail = prompt('Ingresa tu email corporativo:');
        if (!agentEmail) return;
      }
      localStorage.setItem('agent_email', agentEmail);
      document.getElementById('agentEmailDisplay').textContent = agentEmail;
      
      await load();
      document.getElementById('loader').style.display = 'none';
      setInterval(load, 15000);
      setInterval(() => fetch(`/api/agent/touch?email=${agentEmail}`, {method:'POST'}), 10000);
    }

    async function load() {
      try {
        const [dataRes, statsRes, agentRes] = await Promise.all([
          fetch(`/api/leads/mine?email=${encodeURIComponent(agentEmail)}`).then(r => r.json()),
          fetch(`/api/leads/stats?email=${encodeURIComponent(agentEmail)}`).then(r => r.json()),
          fetch(`/api/agent/info?email=${encodeURIComponent(agentEmail)}`).then(r => r.json())
        ]);

        if (statsRes.success) {
          document.getElementById('sideQueue').textContent = statsRes.queue;
          document.getElementById('sideMine').textContent = statsRes.pendientes;
          document.getElementById('sideSla').textContent = statsRes.sla;
          document.getElementById('sideFollowups').textContent = statsRes.followups || '—';
          document.getElementById('sideSales').textContent = statsRes.sales_today;
        }

        if (dataRes.success) {
          document.getElementById('badgeActive').textContent = dataRes.active.length;
          document.getElementById('badgeFollowups').textContent = dataRes.followups.length;
          document.getElementById('badgeSales').textContent = dataRes.sales.length;
          document.getElementById('badgeBackoffice').textContent = dataRes.backoffice.length;
          renderTab(dataRes);
        }

        if (agentRes.agent) {
          agentState = agentRes.agent.estado;
          updateStatusUI();
        }
      } catch (e) {
        console.error(e);
      }
    }

    function renderTab(data) {
      const list = data[currentTab] || [];
      const container = document.getElementById('tab-' + currentTab);
      
      if (list.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><div style="font-size:14px; font-weight:600">Nada pendiente en esta pestaña.</div></div>`;
        return;
      }

      container.innerHTML = list.map(l => `
        <div class="card" style="padding:16px; display:flex; justify-content:space-between; align-items:center">
          <div>
            <div style="font-weight:700; font-size:14px">${l.linea || l.message_id.substring(0,8)}</div>
            <div style="font-size:11px; color:var(--muted)">${l.nombre || 'Sin nombre'} · ${l.plan || 'Plan s/e'}</div>
          </div>
          <button class="btn btn-outline" style="border-radius:6px; font-size:11px" onclick="openGestion('${l.message_id}')">Gestionar</button>
        </div>
      `).join('');
    }

    function switchTab(t) {
      currentTab = t;
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      event.target.classList.add('active');
      load();
    }

    async function setStatus(s) {
      const res = await fetch(`/api/agent/status?email=${encodeURIComponent(agentEmail)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estado: s })
      }).then(r => r.json());
      if (res.success) {
        agentState = s;
        updateStatusUI();
      }
    }

    function updateStatusUI() {
      document.querySelectorAll('.st-btn').forEach(b => b.classList.remove('active-activo', 'active-pausa', 'active-offline'));
      const btn = document.getElementById('btn-' + agentState) || document.getElementById('id-PAUSA');
      if (btn) btn.classList.add('active-' + agentState.toLowerCase());
    }

    async function takeLead() {
      const res = await fetch(`/api/agent/take?email=${encodeURIComponent(agentEmail)}`, { method: 'POST' }).then(r => r.json());
      if (res.success) load();
      else alert(res.message);
    }
    
    async function manualSale() {
      const linea = prompt('Línea:');
      if (!linea) return;
      const res = await fetch(`/api/agent/manual_sale?email=${encodeURIComponent(agentEmail)}&linea=${encodeURIComponent(linea)}`, { method: 'POST' }).then(r => r.json());
      if (res.success) load();
    }

    init();
  </script>
</body>
</html>
