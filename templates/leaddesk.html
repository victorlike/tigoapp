<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadDesk Tigo · Agente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #050814; --bg1: #0b1220; --bg2: #0f1a2e;
      --card: rgba(15, 27, 51, .72); --card-solid: #0d1b33;
      --line: rgba(148, 163, 184, .18); --muted: #93a4c7;
      --txt: #e2e8f0; --txt-dim: #64748b;
      --accent: #00aef0; --accent-glow: rgba(0, 174, 240, .25);
      --accent-dark: #0369a1; --ok: #34d399;
      --ok-bg: rgba(52, 211, 153, .12); --warn: #fbbf24;
      --warn-bg: rgba(251, 191, 36, .12); --danger: #fb7185;
      --danger-bg: rgba(251, 113, 133, .12); --radius: 14px;
      --radius-sm: 8px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(0, 174, 240, .10), transparent 55%),
                  radial-gradient(900px 500px at 90% 20%, rgba(52, 211, 153, .08), transparent 55%),
                  linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--txt); padding: 16px; min-height: 100vh; overflow-x: hidden;
    }
    .app-container { max-width: 1320px; margin: 0 auto; display: grid; grid-template-rows: auto 1fr; gap: 14px; }
    .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); backdrop-filter: blur(16px); padding: 12px 20px; border-radius: var(--radius); border: 1px solid var(--line); }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), #0ea5e9); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
    .brand-text { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .agent-pill { background: rgba(148, 163, 184, .08); border: 1px solid var(--line); border-radius: 999px; padding: 4px 12px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .btn { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: rgba(148, 163, 184, .08); color: var(--txt); cursor: pointer; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
    .btn:hover { background: rgba(148, 163, 184, .16); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #0ea5e9); border: none; color: #fff; font-weight: 700; box-shadow: 0 4px 12px var(--accent-glow); }
    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 14px; }
    .card { background: var(--card); backdrop-filter: blur(12px); padding: 16px; border-radius: var(--radius); border: 1px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
    .card-head { font-weight: 700; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
    .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 5px 0; border-bottom: 1px solid rgba(148, 163, 184, .06); }
    .stat-val { font-weight: 700; color: var(--txt); }
    .lead-list { display: flex; flex-direction: column; gap: 8px; }
    .lead-item { border: 1px solid var(--line); padding: 12px 14px; border-radius: 12px; background: rgba(15, 27, 51, .5); display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; font-size: 12px; }
    .lead-tag { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .tag-asig { background: rgba(0, 174, 240, .15); color: var(--accent); border: 1px solid rgba(0, 174, 240, .3); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(5, 8, 20, .8); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--card-solid); border: 1px solid var(--line); width: 95%; max-width: 1020px; max-height: 92vh; border-radius: 18px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-body { display: flex; flex-direction: column; overflow-y: auto; flex: 1; }
    .modal-split { display: grid; grid-template-columns: 45% 55%; min-height: 0; }
    .info-col { padding: 20px; border-right: 1px solid var(--line); background: rgba(5, 8, 20, .3); }
    .action-col { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .typification-box { border: 1px solid rgba(251, 191, 36, .25); background: rgba(251, 191, 36, .05); padding: 14px; border-radius: 12px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: rgba(15, 27, 51, .6); color: var(--txt); font-size: 12px; }
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line); background: rgba(148, 163, 184, .07); font-size: 11px; color: var(--muted); }
    .toast-wrap { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 11px 18px; border-radius: 10px; font-size: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.3); background: var(--card-solid); border: 1px solid var(--line); color: #fff; }
    .loader { position: fixed; inset: 0; background: rgba(5,8,20,.6); display: none; justify-content: center; align-items: center; z-index: 4000; }
    .spinner { width: 44px; height: 44px; border: 3px solid transparent; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader"><div class="spinner"></div></div>
  <div class="toast-wrap" id="toast-root"></div>

  <div class="app-container">
    <div class="header">
      <div class="brand"><div class="brand-icon">T</div><div><div class="brand-text">Tigo LeadDesk</div></div></div>
      <div class="header-right">
        <div class="agent-pill">Agente: <strong id="agent-name">...</strong></div>
        <div id="status-btns" style="display:flex;gap:6px;">
          <button class="btn" onclick="setStatus('ACTIVO')">Activo</button>
          <button class="btn" onclick="setStatus('PAUSA')">Pausa</button>
          <button class="btn" onclick="setStatus('OFFLINE')">Offline</button>
        </div>
        <button class="btn" onclick="refresh()">Actualizar</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-head">Control</div>
        <button class="btn btn-primary" id="btn-take" onclick="takeLead()">Tomar Lead</button>
        <button class="btn" onclick="openManualSaleModal()">Venta Manual</button>
        <div class="sidebar-stats">
          <div class="stat-row"><span>Cola</span><span class="stat-val" id="q-count">0</span></div>
          <div class="stat-row"><span>Mios</span><span class="stat-val" id="my-count">0</span></div>
          <div class="stat-row"><span>Ventas</span><span class="stat-val" id="sales-count">0</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <div style="display:flex;gap:6px;">
            <button class="btn" onclick="setTab('my')">Mis Leads</button>
            <button class="btn" onclick="setTab('fu')">Seguimientos</button>
            <button class="btn" onclick="setTab('sales')">Mis Ventas</button>
            <button class="btn" id="tab-bo" style="display:none;" onclick="setTab('bo')">Backoffice</button>
          </div>
        </div>
        <div class="lead-list" id="tab-body"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div style="padding:16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between;">
        <div class="modal-title">Gestión Cliente</div>
        <button class="btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-split">
          <div class="info-col" id="info-container"></div>
          <div class="action-col">
            <div class="typification-box">
              <label class="lbl">1. Tipo</label>
              <select id="tip-type" onchange="updateResultTypes()"><option value="">-</option></select>
              <label class="lbl">2. Resultado</label>
              <select id="tip-result-type" onchange="updateResults()"><option value="">-</option></select>
              <label class="lbl">3. Res</label>
              <select id="tip-res" onchange="updateMotives()"><option value="">-</option></select>
              <label class="lbl">4. Motivo</label>
              <select id="tip-motive" onchange="checkSale()"><option value="">-</option></select>
              <div id="fu-wrap" style="display:none; margin-top:10px;">
                <label class="lbl">Rellamar</label><input type="datetime-local" id="fu-datetime">
              </div>
            </div>
            <div id="sale-container" style="display:none;">
              <select id="sale-form-selector" onchange="renderSaleForm(this.value)">
                <option value="">- Tipo Venta -</option>
                <option value="migracion">Migración</option>
                <option value="alta">Alta</option>
                <option value="porta">Porta</option>
              </select>
              <textarea id="seller-comment" placeholder="Comentario vendedor..."></textarea>
              <div id="dynamic-form"></div>
            </div>
          </div>
        </div>
        <div style="padding:16px; border-top:1px solid var(--line);">
          <textarea id="notes" placeholder="Notas..."></textarea>
          <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:8px;">
            <button class="btn" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="save()">GUARDAR</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- FastAPI Adaptation ---
    const agentEmail = new URLSearchParams(window.location.search).get('email') || prompt("Ingresa tu email:");
    if (!agentEmail) { alert("Email requerido"); window.location.href="/login.html"; }

    const google = {
      script: {
        run: {
          withSuccessHandler: function(callback) { this._success = callback; return this; },
          withFailureHandler: function(callback) { this._failure = callback; return this; },
          apiGetInitialData: async function() {
            const r = await fetch(`/api/agent/init?email=${encodeURIComponent(agentEmail)}`).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiSetAgentStatus: async function(s) {
            const r = await fetch(`/api/agent/status?email=${encodeURIComponent(agentEmail)}`, {
              method: 'PATCH', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({estado: s})
            }).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiTakeNextLead: async function() {
            const r = await fetch(`/api/agent/take?email=${encodeURIComponent(agentEmail)}`, {method: 'POST'}).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiGetFollowups: async function() {
            const r = await fetch(`/api/leads/followups?email=${encodeURIComponent(agentEmail)}`).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiListSalesForSeller: async function() {
            const r = await fetch(`/api/seller/sales?email=${encodeURIComponent(agentEmail)}`).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiListSalesForBackoffice: async function(filter) {
            const r = await fetch(`/api/sales/backoffice?q=${encodeURIComponent(filter?.q || '')}`).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiGetLeadDetails: async function(id) {
            const r = await fetch(`/api/leads/${id}`).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiPhoneDupContext: async function(phone, mid) {
            const r = await fetch(`/api/leads/dup_check?phone=${phone}&message_id=${mid}`).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiReleaseLead: async function(mid, reason) {
            const r = await fetch(`/api/leads/${mid}/release?email=${encodeURIComponent(agentEmail)}`, {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({motivo: reason})
            }).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiCloseLead: async function(mid, status, notes, saleData, tip, resType, res, motive, fuWhen, fuType) {
             const r = await fetch(`/api/leads/${mid}/status`, {
              method: 'PATCH', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                estado: status, notas: notes, sale_data: saleData,
                tip_tipo: tip, tip_resultado: resType, tip_motivo: res, tip_submotivo: motive,
                rellamar_en: fuWhen, reagendar_tipo: fuType
              })
            }).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiSaveManualSale: async function(saleData, notes, tip, resType, res, motive) {
             const r = await fetch(`/api/sales/manual`, {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                ...saleData, agente: agentEmail, message_id: 'manual-' + Date.now(),
                producto: saleData.Producto || saleData.TipoVenta || 'VENTA',
                tipo_venta: saleData.TipoVenta || 'VENTA',
                vendedor_comentarios: saleData.VendedorComentarios,
                tip_tipo: tip, tip_resultado: resType, tip_motivo: res, tip_submotivo: motive
              })
            }).then(res => res.json());
            if (this._success) this._success(r);
          },
          apiSetSellerComment: async function(mid, txt) {
             const r = await fetch(`/api/seller/sales/${mid}/comment?email=${encodeURIComponent(agentEmail)}`, {
               method: 'PATCH', headers: {'Content-Type': 'application/json'},
               body: JSON.stringify({comentario: txt})
             }).then(res => res.json());
            if (this._success) this._success(r);
          },
           apiMarkSaleReviewed: async function(mid, st, notas) {
             const r = await fetch(`/api/sales/${mid}/backoffice?status=${encodeURIComponent(st)}&notas=${encodeURIComponent(notas || '')}&agent=${encodeURIComponent(agentEmail)}`, {method: 'PATCH'}).then(res => res.json());
            if (this._success) this._success(r);
          }
        }
      }
    };

    const TYPES = {};
    RAW_TIP.split('\n').forEach(line => {
      let [c1, c2, c3, c4] = (line || '').split('\t');
      if (!c1 || c1.trim() === 'ConsultaInicial') return;
      c1 = c1.trim(); c2 = (c2||'').trim(); c3 = (c3||'').trim(); c4 = (c4||'').trim();
      if (!TYPES[c1]) TYPES[c1] = {};
      if (!TYPES[c1][c2]) TYPES[c1][c2] = {};
      if (!TYPES[c1][c2][c3]) TYPES[c1][c2][c3] = [];
      if (c4 && c4 !== '-') TYPES[c1][c2][c3].push(c4);
    });

    let ACTIVE_PLANS = [];
    let ACTIVE_EQUIPMENT = [];
    let CATALOG_DATA = [];

    var app = { agent: agentEmail, myLeads: [], followups: [], mySales: [], isBO: false };
    var currentTab = 'my';

    function init() {
      const s = document.getElementById('tip-type');
      Object.keys(TYPES).sort().forEach(k => s.add(new Option(k, k)));
      refresh();
      setInterval(() => softRefresh(), 5000); // 5s polling for instant auto-assignment
    }

    function processInitData(res) {
        app.agent = res.agentEmail;
        app.isBO = res.isBO;
        app.myLeads = res.myLeads || [];
        
        CATALOG_DATA = res.catalog || [];
        ACTIVE_PLANS = CATALOG_DATA.filter(c => c.item_type === 'PLAN').map(c => c.name);
        ACTIVE_EQUIPMENT = CATALOG_DATA.filter(c => c.item_type === 'EQUIPO').map(c => c.name);

        document.getElementById('agent-name').innerText = app.agent;
        document.getElementById('q-count').innerText = res.queueCount;
        document.getElementById('my-count').innerText = app.myLeads.length;
        if (app.isBO) document.getElementById('tab-bo').style.display = 'block';
        if (typeof renderActiveTab === 'function') renderActiveTab();
    }

    function refresh() {
      document.getElementById('loader').style.display = 'flex';
      google.script.run.withSuccessHandler(res => {
        document.getElementById('loader').style.display = 'none';
        processInitData(res);
      }).apiGetInitialData();
    }

    function softRefresh() {
      // Refresh without the full screen loader
      google.script.run.withSuccessHandler(res => {
        processInitData(res);
      }).apiGetInitialData();
    }

    function setTab(t) { currentTab = t; renderActiveTab(); }

    function renderActiveTab() {
      const c = document.getElementById('tab-body');
      c.innerHTML = '';
      let list = [];
      if (currentTab === 'my') list = app.myLeads;
      if (currentTab === 'fu') list = app.followups;
      if (currentTab === 'sales') list = app.mySales;
      if (currentTab === 'bo') list = app.boSales;

      if (!list.length) { c.innerHTML = '<div style="padding:40px; color:var(--txt-dim); font-size:13px; text-align:center;">No hay registros en esta sección</div>'; return; }

      list.forEach(l => {
        const mid = l.message_id || l.messageId;
        const title = l.nombre || l.cliente_nombre || 'S/N';
        const subtitle = l.linea || l.cliente_telefono || '-';
        const st = l.estado || l.backoffice_status || 'ASIGNADO';
        
        c.innerHTML += `
          <div class="lead-item">
            <div style="font-weight:700; color:var(--txt);">${title}</div>
            <div style="color:var(--txt-dim); font-size:11px;">${subtitle}</div>
            <div style="display:flex; justify-content:flex-end; gap:8px;">
               <span class="pill" style="margin-right:8px;">${st}</span>
               <button class="btn btn-primary" style="padding:5px 10px;" onclick="openModal('${mid}')">Gestionar</button>
            </div>
          </div>
        `;
      });
    }

    function renderModalInfo(l) {
      const h = (f, v) => v ? `<div style="padding:10px; border-bottom:1px solid rgba(148,163,184,.08);"><span style="color:var(--txt-dim); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px;">${f}</span><div style="font-size:13px; margin-top:3px; color:var(--txt);">${v}</div></div>` : '';
      let html = `<div style="display:grid; grid-template-columns:1fr 1fr; background:rgba(5,8,20,.2); border-radius:12px; overflow:hidden; border:1px solid var(--line);">`;
      html += h('Nombre', l.nombre || l.cliente_nombre);
      html += h('Teléfono', l.linea || l.cliente_telefono);
      html += h('Documento', l.documento || l.cliente_cedula);
      html += h('Plan Interés', l.plan || l.venta_plan);
      html += h('Origen', l.origen);
      html += h('Fecha', l.fecha_gmail || l.created_at);
      html += h('Gaid', l.gaid);
      html += h('Dirección', l.direccion);
      html += `</div>`;
      if (l.url) html += `<div style="margin-top:12px;"><a href="${l.url}" target="_blank" class="btn" style="width:100%; justify-content:center; background:rgba(148,163,184,.15); font-weight:700;">Ver Original en Gmail</a></div>`;
      document.getElementById('info-container').innerHTML = html;
    }

    function openModal(id) {
      document.getElementById('loader').style.display = 'flex';
      google.script.run.withSuccessHandler(r => {
        document.getElementById('loader').style.display = 'none';
        app.current = r.lead || r.sale;
        if (!app.current) { alert("Error al cargar detalles"); return; }
        
        renderModalInfo(app.current);
        document.getElementById('modal').style.display = 'flex';
        
        // Reset tipification
        document.getElementById('tip-type').value = '';
        updateResultTypes();
        document.getElementById('sale-container').style.display = 'none';
        document.getElementById('fu-wrap').style.display = 'none';
        document.getElementById('notes').value = '';
        document.getElementById('dynamic-form').innerHTML = '';
        document.getElementById('sale-form-selector').value = '';
        document.getElementById('seller-comment').value = '';
        
        if (app.current.vendedor_comentarios) {
           document.getElementById('seller-comment').value = app.current.vendedor_comentarios;
        }
      }).apiGetLeadDetails(id);
    }

    const UI = {
      inp: (id, lbl, ph) => `<div style="margin-bottom:10px;"><label style="font-size:11px;font-weight:700;color:var(--muted);">${lbl}</label><input type="text" id="f-${id}" placeholder="${ph||''}"></div>`,
      date: (id, lbl) => `<div style="margin-bottom:10px;"><label style="font-size:11px;font-weight:700;color:var(--muted);">${lbl}</label><input type="date" id="f-${id}"></div>`,
      sel: (id, lbl, opts) => `<div style="margin-bottom:10px;"><label style="font-size:11px;font-weight:700;color:var(--muted);">${lbl}</label><select id="f-${id}" onchange="if('${id}'==='venta_plan'||'${id}'==='venta_equipo') autoFillPrice('${id}', this.value);"><option value="">-</option>${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div>`,
      numb: (id, lbl, ph) => `<div style="margin-bottom:10px;"><label style="font-size:11px;font-weight:700;color:var(--muted);">${lbl}</label><input type="number" id="f-${id}" placeholder="${ph||''}"></div>`,
    };

    function autoFillPrice(sourceId, nameSelected) {
      if (!nameSelected) return;
      const match = CATALOG_DATA.find(c => c.name === nameSelected);
      if (match && document.getElementById('f-venta_precio')) {
         document.getElementById('f-venta_precio').value = match.price;
      }
    }

    function renderSaleForm(type) {
      if (!type) { document.getElementById('dynamic-form').innerHTML = ''; return; }
      
      const pPago = ['Contraentrega', 'Tarjeta de credito', 'Financiacion en la factura', 'Link de pago'];
      let html = '';
      
      html += UI.inp('cliente_cedula', 'Cédula', 'Documento del cliente');
      html += UI.inp('cliente_nombre', 'Nombre', 'Nombre del cliente');
      html += UI.inp('cliente_telefono', 'Teléfono de Contacto', '');
      html += UI.inp('cliente_email', 'Email', '');
      html += UI.date('cliente_nacimiento', 'Fecha de Nacimiento');
      html += UI.inp('direccion', 'Dirección de Entrega', '');
      html += UI.inp('departamento', 'Departamento', '');
      html += UI.inp('ciudad', 'Ciudad/Localidad', '');
      
      if (type === 'alta' || type === 'migracion' || type === 'porta') {
          html += UI.sel('venta_plan', 'Plan Vendido', ACTIVE_PLANS);
          html += UI.sel('venta_equipo', 'Equipo', ACTIVE_EQUIPMENT);
          html += UI.numb('venta_precio', 'Precio/Valor Final', '0');
          html += UI.sel('venta_pago', 'Método de Pago', pPago);
      }
      
      if (type === 'porta') {
          html += UI.inp('porta_numero', 'Línea a Portar', 'Ej: 09...');
          html += UI.sel('porta_operador', 'Operador Donante', ['Claro', 'Antel']);
          html += UI.inp('porta_nip', 'NIP / PIN', '');
      }

      document.getElementById('dynamic-form').innerHTML = html;
    }

    function save() {
      const tip = document.getElementById('tip-type').value;
      const tr = document.getElementById('tip-result-type').value;
      const r = document.getElementById('tip-res').value;
      const m = document.getElementById('tip-motive').value;
      if (!tip || !tr || !r) { alert("Debes completar la tipificación (Tipo, Resultado y Res)"); return; }

      const notes = document.getElementById('notes').value;
      const isManual = app.current?.message_id?.includes('manual-');
      
      const saleData = {};
      const isSale = (tr.toLowerCase() === 'venta' || r.toLowerCase() === 'venta');
      
      if (isSale) {
        const formType = document.getElementById('sale-form-selector').value;
        if (!formType) { alert("Selecciona el Tipo de Venta para habilitar el formulario"); return; }
        
        saleData.Producto = formType;
        saleData.VendedorComentarios = document.getElementById('seller-comment').value;
        const inputs = document.querySelectorAll('#dynamic-form [id^="f-"]');
        inputs.forEach(i => {
           const key = i.id.replace('f-', '');
           saleData[key] = i.value;
        });
        
        if (!saleData.cliente_cedula || !saleData.cliente_telefono) { 
           alert("Cédula y Teléfono son obligatorios para registrar una venta"); return; 
        }
      }

      document.getElementById('loader').style.display = 'flex';
      const success = () => { document.getElementById('loader').style.display = 'none'; closeModal(); refresh(); };
      
      if (isManual) {
        google.script.run.withSuccessHandler(success).apiSaveManualSale(saleData, notes, tip, tr, r, m);
      } else {
        const finalStatus = isSale ? 'Venta' : (tr === 'Rellamado' ? 'SEGUIMIENTO' : 'CERRADO');
        google.script.run.withSuccessHandler(success).apiCloseLead(app.current.message_id, finalStatus, notes, saleData, tip, tr, r, m);
      }
    }

    function openManualSaleModal() {
      app.current = { message_id: 'manual-' + Date.now(), nombre: '', linea: '' };
      document.getElementById('modal').style.display = 'flex';
      
      // Reset tipification
      document.getElementById('tip-type').value = '';
      updateResultTypes();
      document.getElementById('sale-container').style.display = 'none';
      document.getElementById('fu-wrap').style.display = 'none';
      document.getElementById('notes').value = '';
      document.getElementById('dynamic-form').innerHTML = '';
      document.getElementById('sale-form-selector').value = '';
      document.getElementById('seller-comment').value = '';
    }

    function setStatus(s) {
      document.getElementById('loader').style.display = 'flex';
      google.script.run.withSuccessHandler(res => {
        document.getElementById('loader').style.display = 'none';
        if (res.success || res.estado) {
          app.agentStatus = s;
          document.getElementById('agent-name').innerText = app.agent + ' (' + s + ')';
          toast('Estado actualizado a ' + s, 'ok');
        } else {
          toast(res.detail || res.error || 'Error cambiando estado', 'err');
        }
      }).apiSetAgentStatus(s);
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function takeLead() {
      document.getElementById('loader').style.display = 'flex';
      google.script.run.withSuccessHandler(res => {
        document.getElementById('loader').style.display = 'none';
        if (res.success) {
          toast('Lead asignado exitosamente', 'ok');
          refresh();
        } else {
          toast(res.detail || res.message || 'Error tomando lead', 'err');
        }
      }).apiTakeNextLead();
    }

    function updateResultTypes() {
      const t = document.getElementById('tip-type').value;
      const s = document.getElementById('tip-result-type');
      s.innerHTML = '<option value="">-</option>';
      if (t && TYPES[t]) Object.keys(TYPES[t]).sort().forEach(k => s.add(new Option(k,k)));
      updateResults();
    }
    
    function updateResults() {
      const t = document.getElementById('tip-type').value;
      const r = document.getElementById('tip-result-type').value;
      const s = document.getElementById('tip-res');
      s.innerHTML = '<option value="">-</option>';
      if (t && r && TYPES[t][r]) Object.keys(TYPES[t][r]).sort().forEach(k => s.add(new Option(k,k)));
      updateMotives();
    }
    
    function updateMotives() {
      const t = document.getElementById('tip-type').value;
      const r = document.getElementById('tip-result-type').value;
      const c = document.getElementById('tip-res').value;
      const s = document.getElementById('tip-motive');
      s.innerHTML = '<option value="">-</option>';
      if (t && r && c && TYPES[t][r][c]) {
        TYPES[t][r][c].forEach(m => s.add(new Option(m,m)));
      }
      checkSale();
    }
    
    function checkSale() {
      const tr = document.getElementById('tip-result-type').value.toLowerCase();
      const r = document.getElementById('tip-res').value.toLowerCase();
      
      const isSale = (tr.includes('venta') && !tr.includes('cancelada') && !tr.includes('no venta')) || 
                     (r.includes('venta') && !r.includes('cancelada') && !r.includes('no venta'));
                     
      document.getElementById('sale-container').style.display = isSale ? 'block' : 'none';
      
      const isRellamado = (tr.includes('rellamado') || r.includes('rellamado'));
      document.getElementById('fu-wrap').style.display = isRellamado ? 'block' : 'none';
    }

    init();
  </script>
</body>
</html>
