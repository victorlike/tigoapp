<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Tigo Leads — Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --accent: #0ea5e9;
      --accent-glow: rgba(14, 165, 233, 0.35);
      --glass: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.15) 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .font-display { font-family: 'Outfit', sans-serif; }
    
    .glass {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .btn-glow:hover {
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Animated background elements */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent);
      filter: blur(120px);
      opacity: 0.12;
      z-index: -1;
      border-radius: 50%;
      animation: float 20s infinite alternate;
    }
    @keyframes float {
      from { transform: translate(-20%, -20%) scale(1); }
      to { transform: translate(20%, 20%) scale(1.1); }
    }

    .loader-spin {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .role-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .role-card:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(8px);
      border-color: var(--accent);
    }
  </style>
</head>
<body class="p-6">
  <div class="blob" style="top: 10%; left: 10%;"></div>
  <div class="blob" style="bottom: 15%; right: 10%; background: #4f46e5;"></div>

  <!-- LOGIN BOX -->
  <div id="loginBox" class="glass w-full max-w-[420px] rounded-[32px] p-10 md:p-12 animate-in fade-in zoom-in duration-700">
    <div class="flex flex-col items-center mb-10">
      <div class="w-16 h-16 bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/30 mb-6">
        <span class="text-white text-3xl font-black font-display">T</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-extrabold font-display gradient-text tracking-tight mb-2">Tigo Leads</h1>
      <p class="text-slate-400 text-sm font-medium">Ingresa para empezar a gestionar</p>
    </div>

    <div class="space-y-5">
      <div class="relative group">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1 mb-1.5 block">Email Corporativo</label>
        <input type="email" id="emailInput" placeholder="nombre@xtendo-it.com" autocomplete="email"
          class="w-full bg-slate-900/50 border border-white/10 rounded-2xl px-5 py-4 text-white text-sm outline-none transition-all duration-300">
      </div>

      <button id="btnLogin" onclick="login()" 
        class="btn-glow w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 rounded-2xl transition-all duration-300 active:scale-95 shadow-lg shadow-sky-500/20 flex items-center justify-center gap-2">
        <span>Ingresar</span>
        <div id="loader" class="hidden loader-spin"></div>
      </button>
    </div>

    <div class="mt-8 text-center">
      <p class="text-[11px] text-slate-500 italic">Exclusivo para uso interno autorizado.</p>
    </div>
  </div>

  <!-- ROLE SELECTION BOX -->
  <div id="roleBox" class="glass hidden w-full max-w-[440px] rounded-[32px] p-10 md:p-12 animate-in slide-in-from-bottom duration-500">
    <div class="flex items-center gap-4 mb-8">
      <div class="w-12 h-12 bg-indigo-500/20 rounded-xl flex items-center justify-center text-indigo-400 text-xl font-bold">👋</div>
      <div>
        <h2 id="welcomeTitle" class="text-xl md:text-2xl font-bold font-display text-white tracking-tight">Hola, Usuario</h2>
        <p class="text-slate-400 text-xs">Selecciona tu destino</p>
      </div>
    </div>

    <div id="roleButtons" class="space-y-3">
       <!-- Role buttons injected by JS -->
    </div>

    <button onclick="location.reload()" 
      class="mt-8 w-full py-4 text-slate-500 hover:text-white text-xs font-bold tracking-widest uppercase transition-colors">
      ← Usar otra cuenta
    </button>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      if (!email || !email.includes('@')) {
        showError('Ingresa un email corporativo válido.');
        return;
      }

      const btn = document.getElementById('btnLogin');
      const loader = document.getElementById('loader');
      
      btn.disabled = true;
      loader.classList.remove('hidden');
      btn.classList.add('opacity-80', 'cursor-not-allowed');

      try {
        const res = await fetch(`/api/agent/info?email=${encodeURIComponent(email)}`).then(r => r.json());
        
        if (!res.success) {
          showError(res.error || 'No se pudo verificar tu cuenta.');
          return;
        }

        const agent = res.agent;
        localStorage.setItem('agent_email', email);
        const role = (agent.role || 'AGENT').toUpperCase();

        if (role === 'AGENT') {
          location.href = `/leaddesk?email=${encodeURIComponent(email)}`;
          return;
        }

        // Show options for Admin/Coord
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('roleBox').classList.remove('hidden');
        document.getElementById('welcomeTitle').textContent = `Hola, ${email.split('@')[0]}`;
        
        const btnBox = document.getElementById('roleButtons');
        btnBox.innerHTML = '';

        if (role === 'ADMIN') {
          btnBox.innerHTML += createRoleBtn('Panel Admin', 'Configuración y Auditoría', `/admin?email=${encodeURIComponent(email)}`, '🛠️');
          btnBox.innerHTML += createRoleBtn('Torre de Control', 'Gestión de Equipos', `/coordinator?email=${encodeURIComponent(email)}`, '🎯');
          btnBox.innerHTML += createRoleBtn('Portal Agente', 'Gestión de Leads', `/leaddesk?email=${encodeURIComponent(email)}`, '💬');
        } else if (role === 'COORD') {
          btnBox.innerHTML += createRoleBtn('Torre de Control', 'Gestión de Equipos', `/coordinator?email=${encodeURIComponent(email)}`, '🎯');
          btnBox.innerHTML += createRoleBtn('Portal Agente', 'Gestión de Leads', `/leaddesk?email=${encodeURIComponent(email)}`, '💬');
        }

      } catch (e) {
        console.error(e);
        showError('Error de conexión con el servidor.');
      } finally {
        btn.disabled = false;
        loader.classList.add('hidden');
        btn.classList.remove('opacity-80', 'cursor-not-allowed');
      }
    }

    function createRoleBtn(title, sub, url, icon) {
      return `
        <button class="role-card w-full text-left glass bg-white/[0.03] border-white/5 p-5 rounded-2xl flex items-center justify-between group" onclick="location.href='${url}'">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center text-lg">${icon}</div>
            <div>
              <div class="text-[13px] font-bold text-white group-hover:text-sky-400 transition-colors">${title}</div>
              <div class="text-[10px] text-slate-500 font-medium">${sub}</div>
            </div>
          </div>
          <div class="text-white/20 group-hover:translate-x-1 group-hover:text-sky-400 transition-all">→</div>
        </button>`;
    }

    function showError(msg) {
      alert(msg); // Placeholder for better toast later
    }

    document.getElementById('emailInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
    
    // Auto-fill if exists
    const saved = localStorage.getItem('agent_email');
    if (saved) document.getElementById('emailInput').value = saved;
  </script>
</body>
</html>
